  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; min-height: 100vh; min-height: 100dvh; }
    body {
      font-family: 'Lato', system-ui, sans-serif;
      color: #fef3c7;
      background:
        repeating-linear-gradient(135deg, rgba(160,110,60,0.06) 0, rgba(160,110,60,0.06) 2px, transparent 2px, transparent 14px),
        radial-gradient(circle at 30% 20%, #2a1d14 0%, #1a120c 60%, #0d0907 100%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: max(40px, env(safe-area-inset-top)) 24px max(40px, env(safe-area-inset-bottom));
      position: relative;
      -webkit-font-smoothing: antialiased;
    }
    body::before, body::after { content:''; position:absolute; left:0; right:0; pointer-events:none; }
    body::before { top:0; height:120px; background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent); }
    body::after { bottom:0; height:160px; background: linear-gradient(to top, rgba(0,0,0,.7), transparent); }

    /* Logo: usa a imagem como fundo, ampliada até a parte da logo encher o círculo */
    .logo-circle {
      width: clamp(180px, 50vw, 220px);
      aspect-ratio: 1;
      border-radius: 50%;
      background-image: url('logo.png');
      background-size: 200% auto;        /* AMPLIA a imagem 3x para a logo encher o círculo */
      background-position: center center; /* centraliza no meio (onde está a logo) */
      background-repeat: no-repeat;
      background-color: #f5f1ea;          /* fundo creme caso vaze alguma transparência */
      box-shadow:
        0 0 0 4px rgba(254,243,199,.15),
        0 0 0 6px rgba(254,243,199,.08),
        0 20px 50px rgba(0,0,0,.5);
      animation: fadeUp 0.6s ease-out both;
      flex-shrink: 0;
    }

    .tagline { text-align: center; margin: 32px 0 36px; animation: fadeUp 0.6s ease-out 0.1s both; }
    .tagline-pre { font-family:'Caveat', cursive; font-size: clamp(22px, 6vw, 28px); color: rgba(254,243,199,.75); display:block; margin-bottom: 4px; }
    .tagline-main { font-family:'Playfair Display', serif; font-size: clamp(22px, 6.5vw, 28px); font-weight: 300; line-height: 1.2; }
    .tagline-main em { color: #fde68a; font-style: italic; font-weight: 400; }

    .buttons { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 14px; animation: fadeUp 0.6s ease-out 0.2s both; }

    .btn {
      width: 100%;
      background: rgba(254, 252, 232, 0.95);
      color: #78350f;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 20px;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,.25), 0 1px 0 rgba(255,255,255,.6) inset;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: transform .15s, background .15s;
      letter-spacing: 1px;
      min-height: 56px;
    }
    .btn:hover { background: #fff; }
    .btn:active { transform: scale(.97); }
    .btn-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .btn-primary {
      background: #fde68a;
      color: #1c1917;
    }
    .btn-primary:hover { background: #fef3c7; }

    .footer {
      margin-top: 28px; text-align: center;
      color: rgba(254,243,199,.5); font-size: 12px;
      animation: fadeUp 0.6s ease-out 0.3s both;
    }

    @keyframes fadeUp { from { opacity:0; transform: translateY(12px);} to { opacity:1; transform:none;} }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
